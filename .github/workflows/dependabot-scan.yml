name: Dependabot Alert Scan

# Runs dependabot_scan.py to scan open Dependabot alerts and dispatch fixes to Devin.
on:
  schedule:
    # Weekday mornings only. Cron is in UTC; 13:00 UTC ≈ 9am US Eastern / 6am US Pacific.
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore scan state
        uses: actions/cache/restore@v4        # restore-only variant
        with:
          path: .dependabot_state.json
          key: dependabot-state-${{ github.run_id }}
          restore-keys: dependabot-state-

      - name: Run Dependabot scan
        env:
          # Add these as repository secrets (Settings -> Secrets and variables -> Actions).
          # GITHUB_TOKEN must be a PAT with security_events (or repo) scope to read
          # Dependabot alerts; the default GITHUB_TOKEN cannot read another repo's alerts.
          GITHUB_TOKEN: ${{ secrets.DEPENDABOT_SCAN_TOKEN }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          MAX_DISPATCH: "3"   # cap unattended runs; policy as deployment config
        run: python dependabot_scan.py

      - name: Save scan state
        if: always()                          # persist even when the scan fails
        uses: actions/cache/save@v4
        with:
          path: .dependabot_state.json
          key: dependabot-state-${{ github.run_id }}